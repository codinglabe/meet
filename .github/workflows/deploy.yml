name: Deploy Kreo Meet

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      APP_DIR: ${{ secrets.APP_DIR }}

    steps:
      - name: Deploy over SSH
        shell: bash
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/kreo_meet_deploy
          chmod 600 ~/.ssh/kreo_meet_deploy
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/kreo_meet_deploy -p "$PORT" "$SSH_USER@$SSH_HOST" "APP_DIR='$APP_DIR' bash -s" <<'REMOTE'
            set -euo pipefail
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            bash scripts/stop.sh || true
            bash scripts/start.sh
            for i in {1..20}; do
              if curl -fsS http://127.0.0.1:8080/health; then
                exit 0
              fi
              sleep 1
            done
            echo "Health check failed after waiting for app startup" >&2
            tail -80 logs/server.log || true
            exit 1
          REMOTE
